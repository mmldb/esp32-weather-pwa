<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ESP32 Weather</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#000000" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    :root {
      --bg: #000;
      --card: #050505;
      --border: #f2f2f2;
      --line: #303030;
      --text: #f2f2f2;
      --muted: #8f8f8f;
      --red: #ff3333;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 12px;
      background: var(--bg);
      color: var(--text);
      font-family: "Cascadia Mono", Consolas, monospace;
      -webkit-tap-highlight-color: transparent;
    }

    .container { max-width: 560px; margin: 0 auto; }
    .card { background: var(--card); border: 1px solid var(--line); padding: 14px; margin-bottom: 10px; }
    .label { color: var(--muted); font-size: 0.78rem; text-transform: uppercase; margin-bottom: 8px; }

    .main-row { display: flex; align-items: baseline; gap: 10px; }
    .main-num { font-size: clamp(4.8rem, 22vw, 7.2rem); line-height: 0.9; font-weight: 300; font-variant-numeric: tabular-nums; }
    .main-num.alert { color: var(--red); }
    .main-unit { font-size: 1.8rem; color: var(--muted); }
    .hint { color: var(--muted); margin-top: 8px; font-size: 0.9rem; }
    .hint.alert { color: var(--red); }
    .temp-footer { display: flex; justify-content: space-between; align-items: end; gap: 12px; }
    .updated-inline { color: var(--muted); font-size: 0.74rem; text-align: right; white-space: nowrap; }

    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat { border-top: 1px solid var(--border); padding-top: 12px; }
    .stat-val { font-size: 2.1rem; font-weight: 300; font-variant-numeric: tabular-nums; }
    .stat-val.alert { color: var(--red); }
    .unit { font-size: 1rem; color: var(--muted); margin-left: 4px; }
    .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .meta .stat-val { font-size: 1.35rem; }

    .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
    .tab-btn {
      flex: 1;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      padding: 10px;
      font: inherit;
      cursor: pointer;
    }
    .tab-btn.active { color: var(--text); border-color: var(--border); }
    .range-tabs .tab-btn { padding: 7px; font-size: 0.82rem; }
    .chart-wrap { height: 280px; }

    @media (max-width: 420px) {
      .card { padding: 12px; margin-bottom: 8px; }
      .stats { grid-template-columns: 1fr 1fr; }
      .meta { grid-template-columns: 1fr 1fr; }
      .stat-val { font-size: 1.75rem; }
      .hint { font-size: 0.78rem; }
      .main-unit { font-size: 1.35rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="card">
      <div class="label">homerseklet</div>
      <div class="main-row">
        <div id="temp" class="main-num">--.-</div>
        <div class="main-unit">&deg;C</div>
      </div>
      <div class="temp-footer">
        <div id="tempHint" class="hint">--</div>
        <div id="updated" class="updated-inline">--:--</div>
      </div>
    </section>

    <section class="card stats">
      <div class="stat">
        <div class="label">paratartalom</div>
        <div><span id="hum" class="stat-val">--</span><span class="unit">%</span></div>
        <div id="humHint" class="hint">--</div>
      </div>
      <div class="stat">
        <div class="label">legnyomas</div>
        <div><span id="pressure" class="stat-val">----</span><span class="unit">hPa</span></div>
        <div id="pressureHint" class="hint">--</div>
      </div>
    </section>

    <section class="card meta">
      <div class="stat">
        <div class="label">mai min</div>
        <div><span id="todayMin" class="stat-val">--.-</span><span class="unit">&deg;C</span></div>
      </div>
      <div class="stat">
        <div class="label">mai max</div>
        <div><span id="todayMax" class="stat-val">--.-</span><span class="unit">&deg;C</span></div>
      </div>
    </section>

    <section class="card">
      <div class="tabs">
        <button class="tab-btn active" onclick="setMode(event, 'temperatureC')">temp</button>
        <button class="tab-btn" onclick="setMode(event, 'humidityPct')">para</button>
        <button class="tab-btn" onclick="setMode(event, 'pressureHpa')">nyomas</button>
      </div>
      <div class="tabs range-tabs">
        <button class="tab-btn active" onclick="setRange(event, '1h')">1h</button>
        <button class="tab-btn" onclick="setRange(event, '24h')">24h</button>
        <button class="tab-btn" onclick="setRange(event, '7d')">7d</button>
      </div>
      <div class="chart-wrap"><canvas id="chart"></canvas></div>
    </section>
  </div>

  <script type="module">
    import { firebaseConfig, deviceId } from "./firebase-config.js";

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const latestRef = db.ref("devices/" + deviceId + "/latest");
    const historyRef = db.ref("devices/" + deviceId + "/history");
    const storageKey = "weather-history-" + deviceId;
    let mode = "temperatureC";
    let range = "1h";
    let history = JSON.parse(localStorage.getItem(storageKey) || "[]");

    const chart = new Chart(document.getElementById("chart").getContext("2d"), {
      type: "line",
      data: {
        labels: [],
        datasets: [{
          data: [],
          borderColor: "#f2f2f2",
          borderWidth: 2,
          pointRadius: 2,
          tension: 0.25,
          fill: false
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { color: "#8f8f8f", maxTicksLimit: 5 } },
          y: { grid: { color: "#303030" }, ticks: { color: "#8f8f8f" } }
        }
      }
    });

    function danger(d) {
      return d.temperatureC > 30 || d.temperatureC < 5 || d.humidityPct > 70 || d.humidityPct < 30 || d.pressureHpa > 1035 || d.pressureHpa < 980;
    }

    function tempText(t) {
      if (t > 30) return "tul meleg";
      if (t >= 25) return "meleg";
      if (t >= 20 && t <= 24) return "idealis";
      if (t < 18) return "huvos";
      return "rendben";
    }

    function humidityText(h) {
      if (h < 30) return "szaraz";
      if (h < 40) return "kisse szaraz";
      if (h <= 60) return "rendben";
      if (h > 70) return "tul paras";
      return "magas";
    }

    function num(v, n) {
      return typeof v === "number" ? v.toFixed(n) : "--";
    }

    function normalizedTs(value) {
      if (typeof value !== "number" || value <= 0) return null;
      return value > 1000000000000 ? value : value * 1000;
    }

    function savePoint(d) {
      const point = {
        temperatureC: d.temperatureC,
        humidityPct: d.humidityPct,
        pressureHpa: d.pressureHpa,
        timeText: d.timeText || new Date().toLocaleTimeString("hu-HU", { hour: "2-digit", minute: "2-digit" }),
        ts: normalizedTs(d.ts) || d.uptimeMs || Date.now()
      };

      const last = history[history.length - 1];
      if (last && last.timeText === point.timeText) history[history.length - 1] = point;
      else history.push(point);

      history = history.slice(-10080);
      localStorage.setItem(storageKey, JSON.stringify(history));
    }

    function loadFirebaseHistory(data) {
      if (!data) return;

      history = Object.values(data)
        .filter(p => typeof p.temperatureC === "number")
        .sort((a, b) => (normalizedTs(a.ts) || a.uptimeMs || 0) - (normalizedTs(b.ts) || b.uptimeMs || 0))
        .slice(-10080)
        .map(p => ({
          temperatureC: p.temperatureC,
          humidityPct: p.humidityPct,
          pressureHpa: p.pressureHpa,
          timeText: p.timeText || "xx:xx",
          ts: normalizedTs(p.ts) || p.uptimeMs || 0
        }));

      localStorage.setItem(storageKey, JSON.stringify(history));
      updateTodayRangeDisplay();
      updateChart();
    }

    function updateChart() {
      const windowMs = range === "1h" ? 3600000 : range === "24h" ? 86400000 : 604800000;
      const cutoff = Date.now() - windowMs;
      const validPoints = history.filter(p => typeof p[mode] === "number");
      const realTimePoints = validPoints.filter(p => p.ts && p.ts >= 1000000000000);
      let points = realTimePoints.length > 1
        ? realTimePoints.filter(p => p.ts >= cutoff)
        : validPoints.slice(-120);

      if (points.length < 2 && realTimePoints.length > 1) points = realTimePoints.slice(-120);
      if (points.length < 2) points = validPoints.slice(-120);

      if (range === "24h") points = averagePoints(points, 30 * 60 * 1000);
      if (range === "7d") points = averagePoints(points, 3 * 60 * 60 * 1000);

      chart.data.labels = points.map(p => p.timeText);
      chart.data.datasets[0].data = points.map(p => p[mode]);
      chart.update("none");
    }

    function averagePoints(points, bucketMs) {
      const realTimePoints = points.filter(p => p.ts && p.ts >= 1000000000000);
      if (realTimePoints.length < 2) return points;

      const buckets = {};
      realTimePoints.forEach(p => {
        const key = Math.floor(p.ts / bucketMs) * bucketMs;
        if (!buckets[key]) buckets[key] = { sum: 0, count: 0, ts: key };
        buckets[key].sum += p[mode];
        buckets[key].count += 1;
      });

      return Object.values(buckets)
        .sort((a, b) => a.ts - b.ts)
        .map(b => ({
          [mode]: b.sum / b.count,
          timeText: formatBucketTime(b.ts),
          ts: b.ts
        }));
    }

    function formatBucketTime(ts) {
      const date = new Date(ts);
      if (range === "7d") {
        return String(date.getMonth() + 1).padStart(2, "0") + "." +
          String(date.getDate()).padStart(2, "0") + " " +
          String(date.getHours()).padStart(2, "0") + ":00";
      }

      return String(date.getHours()).padStart(2, "0") + ":" +
        String(date.getMinutes()).padStart(2, "0");
    }

    function pressureTrend() {
      const points = history.filter(p => typeof p.pressureHpa === "number");
      if (points.length < 2) return "trend: --";

      const first = points[Math.max(0, points.length - 30)];
      const last = points[points.length - 1];
      const diff = last.pressureHpa - first.pressureHpa;

      if (diff <= -2) return "gyorsan csokken";
      if (diff < -0.5) return "csokken";
      if (diff >= 2) return "gyorsan emelkedik";
      if (diff > 0.5) return "emelkedik";
      return "stabil";
    }

    function todayTemperatureRange() {
      const start = new Date();
      start.setHours(0, 0, 0, 0);
      const startTs = start.getTime();
      const points = history.filter(p =>
        p.ts &&
        p.ts >= 1000000000000 &&
        p.ts >= startTs &&
        typeof p.temperatureC === "number"
      );

      if (!points.length) return { min: null, max: null };

      const values = points.map(p => p.temperatureC);
      return {
        min: Math.min(...values),
        max: Math.max(...values)
      };
    }

    function updateTodayRangeDisplay() {
      const today = todayTemperatureRange();
      document.getElementById("todayMin").textContent = num(today.min, 1);
      document.getElementById("todayMax").textContent = num(today.max, 1);
    }

    function render(d) {
      document.getElementById("temp").textContent = num(d.temperatureC, 1);
      document.getElementById("hum").textContent = num(d.humidityPct, 0).padStart(2, "0");
      document.getElementById("pressure").textContent = num(d.pressureHpa, 0);
      document.getElementById("tempHint").textContent = tempText(d.temperatureC);
      document.getElementById("humHint").textContent = humidityText(d.humidityPct);
      document.getElementById("pressureHint").textContent = pressureTrend();
      document.getElementById("updated").textContent = d.timeText || "--:--";
      updateTodayRangeDisplay();
      document.getElementById("temp").classList.toggle("alert", d.temperatureC > 30 || d.temperatureC < 5);
      document.getElementById("hum").classList.toggle("alert", d.humidityPct > 70 || d.humidityPct < 30);
      document.getElementById("pressure").classList.toggle("alert", d.pressureHpa > 1035 || d.pressureHpa < 980);
      document.getElementById("tempHint").classList.toggle("alert", d.temperatureC > 30 || d.temperatureC < 5);
      document.getElementById("humHint").classList.toggle("alert", d.humidityPct > 70 || d.humidityPct < 30);
    }

    function startSync() {
      historyRef.limitToLast(10080).on("value", (s) => {
        loadFirebaseHistory(s.val());
      });

      latestRef.on("value", (s) => {
        const d = s.val();
        if (!d) return;
        savePoint(d);
        render(d);
        updateChart();
      });
    }

    function setMode(evt, nextMode) {
      mode = nextMode;
      evt.currentTarget.parentElement.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      evt.currentTarget.classList.add("active");
      updateChart();
    }

    function setRange(evt, nextRange) {
      range = nextRange;
      evt.currentTarget.parentElement.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      evt.currentTarget.classList.add("active");
      updateChart();
    }

    window.setMode = setMode;
    window.setRange = setRange;
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
    startSync();
    updateChart();
  </script>
</body>
</html>
